version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  # 1. Zookeeper - координация брокеров Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181      # Порт для подключения клиентов
      ZOOKEEPER_TICK_TIME: 2000        # Базовый таймаут для heartbeat'ов
    ports:
      - "2181:2181"                    # Маппинг порта на хост

  # 2. Kafka Broker - сервер очередей сообщений
  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      # Хост-машина будет подключаться через localhost:9092
      - "9000:9000"
    environment:
      KAFKA_BROKER_ID: 1               # Уникальный ID брокера
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181  # Адрес Zookeeper
      # Важно: сообщаем клиентам, как подключаться
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9000
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Для разработки ставим 1, в продакшене нужно больше [citation:1]
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 3. Kafka UI - веб-интерфейс для управления
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"                    # UI будет доступен на http://localhost:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: localhost:9000  # Внутреннее имя сервиса в Docker
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
volumes:
  postgres_data: