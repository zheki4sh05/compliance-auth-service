server:
  port: 9091

spring:
  application:
    name: compliance-auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

oauth2:
  authorization-server:
    issuer-url: http://auth-service:9091

    token:
      access-token:
        time-to-live: 900
      refresh-token:
        time-to-live: 604800
        reuse: false

    cors:
      allowed-origins:
        - http://localhost:8081
        - http://localhost:8082
        - http://localhost:8083
        - http://localhost:8084
        - http://localhost:3000

logging:
  level:
    root: INFO
    com.trustflow.compliance_auth_service: DEBUG
    org.springframework.security: INFO
