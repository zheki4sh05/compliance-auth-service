server:
  port: 9091

spring:
  api-docs:
    path: /v1/api-docs
    enabled: true
  application:
    name: compliance-auth-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

oauth2:
  authorization-server:
    issuer-url: http://auth-service:9091
    jwt:
      private-key-pem: ${OAUTH2_PRIVATE_KEY_PEM}
      public-key-pem: ${OAUTH2_PUBLIC_KEY_PEM}
      key-id: ${OAUTH2_KEY_ID:auth-service-rsa-key}

    token:
      access-token:
        time-to-live: 900
      refresh-token:
        time-to-live: 604800
        reuse: false

    cors:
      allowed-origins:
        - http://localhost:8081
        - http://localhost:8082
        - http://localhost:8083
        - http://localhost:8084
        - http://localhost:3000

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    filter: true
    persist-authorization: true
    oauth:
      client-id: swagger-ui-client
      use-pkce-with-authorization-code-grant: true
  packages-to-scan: com.trustflow.compliance_auth_service.controller
  paths-to-match: /api/**,/auth/**

logging:
  level:
    root: INFO
    com.trustflow.compliance_auth_service: DEBUG
    org.springframework.security: INFO

app:
  kafka:
    topics:
      company: ${KAFKA_TOPIC_COMPANY:company}

integration:
  cms-company-info:
    base-url: ${CMS_COMPANY_INFO_BASE_URL:http://cms-company-info:9092}
