server:
  port: 9091

spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# OAuth2 Authorization Server Settings
oauth2:
  authorization-server:
    issuer-url: http://localhost:9091
    jwt:
      private-key-pem: ${OAUTH2_PRIVATE_KEY_PEM:}
      public-key-pem: ${OAUTH2_PUBLIC_KEY_PEM:}
      key-id: ${OAUTH2_KEY_ID:auth-service-rsa-key}

    # Token Settings
    token:
      access-token:
        time-to-live: 86400 # 24 hours in seconds
      refresh-token:
        time-to-live: 604800 # 7 days in seconds
        reuse: false # Refresh token rotation enabled

    # CORS ????????? ??? ?????????????
    cors:
      allowed-origins:
        - http://localhost:8081 # Monitoring Service
        - http://localhost:8082 # Rules Service
        - http://localhost:8083 # Workflow Service
        - http://localhost:8084 # Notification Service
        - http://localhost:3000 # Frontend
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: true

    # Registered Clients (????????????)
    clients:
      - client-id: monitoring-service
        client-secret: "{bcrypt}$2a$12$LQv3c1yqBWVHxkltdWFQg.WJw1oXNAYYzGqnXxzzfQZgI4g6KdOYi"
        scopes:
          - read
          - write
        grant-types:
          - authorization_code
          - refresh_token
          - client_credentials
        redirect-uris:
          - http://localhost:8081/login/oauth2/code/auth-server

      - client-id: rules-service
        client-secret: "{bcrypt}$2a$12$LQv3c1yqBWVHxkltdWFQg.WJw1oXNAYYzGqnXxzzfQZgI4g6KdOYi"
        scopes:
          - read
          - write
          - rules:manage
        grant-types:
          - authorization_code
          - refresh_token
          - client_credentials
        redirect-uris:
          - http://localhost:8082/login/oauth2/code/auth-server

      - client-id: workflow-service
        client-secret: "{bcrypt}$2a$12$LQv3c1yqBWVHxkltdWFQg.WJw1oXNAYYzGqnXxzzfQZgI4g6KdOYi"
        scopes:
          - read
          - write
          - workflow:execute
        grant-types:
          - authorization_code
          - refresh_token
          - client_credentials
        redirect-uris:
          - http://localhost:8083/login/oauth2/code/auth-server

      - client-id: notification-service
        client-secret: "{bcrypt}$2a$12$LQv3c1yqBWVHxkltdWFQg.WJw1oXNAYYzGqnXxzzfQZgI4g6KdOYi"
        scopes:
          - read
          - notifications:send
        grant-types:
          - client_credentials
        redirect-uris:
          - http://localhost:8084/login/oauth2/code/auth-server


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      roles: EXECUTIVE
  health:
    defaults:
      enabled: true

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    filter: true
    persist-authorization: true
    oauth:
      client-id: swagger-ui-client
      use-pkce-with-authorization-code-grant: true
  packages-to-scan: com.trustflow.compliance_auth_service.controller
  paths-to-match: /api/**,/auth/**

# Logging
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    com.company.auth: DEBUG

